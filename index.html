<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TiDeza — Controle de Eventos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0d10;--surface:#16161c;--surface2:#1e1e27;--border:#2a2a38;
    --accent:#f0c060;--accent2:#e07a5f;--accent3:#81b3d2;
    --text:#f0ede6;--muted:#7a7a8c;
    --festa:#f0c060;--dudubar:#e07a5f;--materiais:#81b3d2;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.4}

  #loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:20px}
  .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{color:var(--muted);font-size:.85rem;letter-spacing:2px;text-transform:uppercase}

  #error-banner{display:none;background:rgba(224,122,95,.1);border:1px solid var(--accent2);border-radius:10px;padding:16px 20px;margin:24px 48px;color:var(--accent2);font-size:.85rem;align-items:center;gap:12px}
  #error-banner.show{display:flex}

  header{padding:40px 48px 28px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;position:relative}
  header::after{content:'';position:absolute;bottom:-1px;left:0;width:220px;height:2px;background:linear-gradient(90deg,var(--accent),transparent)}
  .logo{font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:900;letter-spacing:-1px;color:var(--accent);line-height:1}
  .logo span{color:var(--text)}
  .subtitle{font-size:.78rem;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:4px}
  .header-right{text-align:right;font-size:.78rem;color:var(--muted)}
  .header-right strong{color:var(--text);font-size:.9rem;display:block}
  .refresh-btn{margin-top:8px;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.75rem;cursor:pointer;transition:all .2s}
  .refresh-btn:hover{color:var(--accent);border-color:var(--accent)}

  main{padding:36px 48px}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:40px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px 20px;position:relative;overflow:hidden;transition:transform .2s,border-color .2s}
  .stat-card:hover{transform:translateY(-3px);border-color:var(--accent)}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
  .stat-card.gold::before{background:var(--accent)}.stat-card.red::before{background:var(--accent2)}.stat-card.blue::before{background:var(--accent3)}.stat-card.green::before{background:#7ec99a}
  .stat-label{font-size:.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .stat-value{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;line-height:1}
  .stat-card.gold .stat-value{color:var(--accent)}.stat-card.red .stat-value{color:var(--accent2)}.stat-card.blue .stat-value{color:var(--accent3)}.stat-card.green .stat-value{color:#7ec99a}
  .stat-sub{font-size:.72rem;color:var(--muted);margin-top:6px}

  .section-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--muted);letter-spacing:1px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
  .section-title::after{content:'';flex:1;height:1px;background:var(--border)}

  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px}
  .filter-btn{padding:7px 18px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:pointer;transition:all .2s}
  .filter-btn:hover,.filter-btn.active{background:var(--surface2);color:var(--text);border-color:var(--accent)}
  .filter-btn.festa.active{border-color:var(--festa);color:var(--festa)}.filter-btn.dudubar.active{border-color:var(--dudubar);color:var(--dudubar)}.filter-btn.materiais.active{border-color:var(--materiais);color:var(--materiais)}

  .search-wrap{position:relative;margin-bottom:24px;max-width:360px}
  .search-wrap input{width:100%;padding:10px 16px 10px 38px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s}
  .search-wrap input:focus{border-color:var(--accent)}.search-wrap input::placeholder{color:var(--muted)}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}

  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:40px}
  table{width:100%;border-collapse:collapse;font-size:.84rem}
  thead tr{background:var(--surface2)}
  th{padding:14px 16px;text-align:left;font-size:.7rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
  th:hover{color:var(--accent)}
  td{padding:13px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tbody tr{transition:background .15s;cursor:pointer}
  tbody tr:hover{background:var(--surface2)}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:600;letter-spacing:.5px}
  .badge-festa{background:rgba(240,192,96,.15);color:var(--festa)}.badge-dudubar{background:rgba(224,122,95,.15);color:var(--dudubar)}.badge-materiais{background:rgba(129,179,210,.15);color:var(--materiais)}
  .lucro-pos{color:#7ec99a;font-weight:600}.lucro-neg{color:var(--accent2);font-weight:600}

  .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:40px}
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px}
  .chart-title{font-size:.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:18px}
  .bar-item{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .bar-label{width:120px;font-size:.78rem;color:var(--text);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .bar-track{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden}
  .bar-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}
  .bar-val{font-size:.75rem;color:var(--muted);width:70px;text-align:right}
  .donut-wrap{display:flex;align-items:center;gap:20px}
  .donut-legend{display:flex;flex-direction:column;gap:8px}
  .donut-legend-item{display:flex;align-items:center;gap:8px;font-size:.78rem}
  .donut-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

  .timeline-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:40px;overflow-x:auto}
  .timeline-inner{min-width:500px}
  .timeline-months{display:flex;margin-bottom:12px}
  .timeline-month{flex:1;text-align:center;font-size:.68rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
  .timeline-track{position:relative;height:60px}
  .timeline-dot{position:absolute;width:10px;height:10px;border-radius:50%;top:50%;transform:translate(-50%,-50%);cursor:pointer;transition:transform .15s;border:2px solid var(--bg)}
  .timeline-dot:hover{transform:translate(-50%,-50%) scale(1.7);z-index:2}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
  .overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:min(700px,94vw);max-height:86vh;overflow-y:auto;padding:36px;position:relative;transform:translateY(24px);transition:transform .3s;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
  .overlay.open .modal{transform:translateY(0)}
  .modal-close{position:absolute;top:20px;right:20px;width:32px;height:32px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
  .modal-close:hover{color:var(--text);border-color:var(--accent)}
  .modal-name{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;margin-bottom:4px}
  .modal-summary{color:var(--muted);font-size:.83rem;margin-bottom:24px}
  .modal-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
  .modal-kpi{background:var(--surface2);border-radius:10px;padding:14px;border:1px solid var(--border)}
  .modal-kpi-label{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .modal-kpi-value{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700}
  .event-cards{display:flex;flex-direction:column;gap:12px}
  .event-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;border-left:3px solid var(--border)}
  .event-card.festa{border-left-color:var(--festa)}.event-card.dudubar{border-left-color:var(--dudubar)}.event-card.materiais{border-left-color:var(--materiais)}
  .event-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
  .event-card-date{font-size:.75rem;color:var(--muted)}
  .event-card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-size:.78rem}
  .ecg-label{color:var(--muted);font-size:.68rem;margin-bottom:2px}
  .event-obs{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:.78rem;color:var(--muted);font-style:italic}

  footer{border-top:1px solid var(--border);padding:20px 48px;display:flex;justify-content:space-between;align-items:center;font-size:.75rem;color:var(--muted)}
  @media(max-width:768px){header{flex-direction:column;align-items:flex-start;gap:8px;padding:24px}main{padding:24px}.modal-kpis{grid-template-columns:repeat(2,1fr)}.charts-row{grid-template-columns:1fr}footer{padding:16px 24px;flex-direction:column;gap:6px}}
  ::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div class="loading-text">Carregando dados da planilha…</div></div>

<header>
  <div>
    <div class="logo">Ti<span>Deza</span></div>
    <div class="subtitle">Controle de Eventos &amp; Serviços</div>
  </div>
  <div class="header-right">
    <strong id="total-events">—</strong> eventos registrados
    <button class="refresh-btn" onclick="loadData()">↻ Atualizar</button>
    <div style="font-size:.7rem;color:var(--muted);margin-top:4px" id="last-update"></div>
  </div>
</header>

<div id="error-banner">⚠️ <span id="error-msg"></span></div>

<main>
  <div class="stats-grid" id="stats-grid"></div>
  <div class="section-title">Análise Visual</div>
  <div class="charts-row">
    <div class="chart-card"><div class="chart-title">Receita por Contratante (Top 8)</div><div id="bar-chart"></div></div>
    <div class="chart-card"><div class="chart-title">Distribuição por Tipo</div><div class="donut-wrap" id="donut-wrap"></div></div>
  </div>
  <div class="section-title">Linha do Tempo</div>
  <div class="timeline-wrap"><div class="timeline-inner"><div class="timeline-months" id="timeline-months"></div><div class="timeline-track" id="timeline-track"></div></div></div>
  <div class="section-title">Todos os Eventos</div>
  <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-bottom:16px">
    <div class="search-wrap" style="margin-bottom:0"><span class="search-icon">🔍</span><input type="text" id="search-input" placeholder="Buscar por nome, local…"></div>
    <div class="filters" id="filters"></div>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th onclick="sortBy('nomeContratante')">Nome ↕</th>
        <th onclick="sortBy('tipoServico')">Tipo ↕</th>
        <th onclick="sortBy('data')">Data ↕</th>
        <th>Local</th>
        <th onclick="sortBy('valor')" style="text-align:right">Valor ↕</th>
        <th onclick="sortBy('qtdMonitores')" style="text-align:right">Mon. ↕</th>
        <th onclick="sortBy('custoMateriais')" style="text-align:right">C.Mat ↕</th>
        <th onclick="sortBy('custoMonitores')" style="text-align:right">C.Mon ↕</th>
        <th onclick="sortBy('lucro')" style="text-align:right">Lucro ↕</th>
      </tr></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</main>

<footer>
  <span>TiDeza · Controle Interno</span>
  <span id="footer-count">—</span>
</footer>

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal"><button class="modal-close" onclick="closeModalBtn()">✕</button><div id="modal-content"></div></div>
</div>

<script>
// ── CONFIG — sua planilha ──────────────────────────────────────
const SHEET_ID = '2PACX-1vSJYgYKHsCVh6D6AIhc_Y8wfBy9ht_4aiaJad7EQFsqCQAzsrqbdDlmdXRUoDQzaGwK3Z9PSkj3I7Mk';
const CSV_URL  = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?output=csv`;

let data=[], filtered=[], sortKey='data', sortDir=1, activeFilter='Todos', searchTerm='';

const fmt = v => isNaN(v)?'—':Number(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:0,maximumFractionDigits:0});
const fmtFull = v => Number(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:2});
const fmtDate = s => { if(!s) return '—'; const p=s.split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:s; };
const badgeClass = t => t==='Festa'?'badge-festa':t==='DuduBar'?'badge-dudubar':'badge-materiais';
const parseNum = s => parseFloat((s||'').toString().replace(',','.'))||0;

// ── CSV PARSER ────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = splitCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const cols = splitCSVLine(line);
    const obj = {};
    headers.forEach((h,i) => obj[h.trim()] = (cols[i]||'').trim());
    return obj;
  }).filter(r => r.nomeContratante && r.nomeContratante !== 'nomeContratante');
}

function splitCSVLine(line) {
  const cols=[]; let cur='', inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;continue}
    if(c===','&&!inQ){cols.push(cur);cur='';continue}
    cur+=c;
  }
  cols.push(cur);
  return cols;
}

// ── LOAD ──────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('loading').style.display='flex';
  document.getElementById('error-banner').classList.remove('show');
  try {
    const res = await fetch(CSV_URL+'&t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    if(!rows.length) throw new Error('Planilha vazia ou colunas não reconhecidas.');
    data = rows.map(r=>({
      nomeContratante: r.nomeContratante||'',
      tipoServico:     r.tipoServico||'',
      data:            r.data||'',
      local:           r.local||'',
      valor:           parseNum(r.valor),
      qtdMonitores:    parseNum(r.qtdMonitores),
      custoMateriais:  parseNum(r.custoMateriais),
      custoMonitores:  parseNum(r.custoMonitores),
      observacoes:     r.observacoes||'',
      lucro:           parseNum(r.valor)-parseNum(r.custoMateriais)-parseNum(r.custoMonitores),
    })).filter(r=>r.nomeContratante);
    document.getElementById('last-update').textContent='Atualizado: '+new Date().toLocaleString('pt-BR');
    renderAll();
  } catch(err) {
    document.getElementById('error-msg').textContent='Não foi possível carregar: '+err.message;
    document.getElementById('error-banner').classList.add('show');
  } finally {
    document.getElementById('loading').style.display='none';
  }
}

function renderAll(){ renderStats();renderBar();renderDonut();renderTimeline();renderFilters();applyFilters(); }

function renderStats(){
  const tv=data.reduce((a,d)=>a+d.valor,0);
  const tcm=data.reduce((a,d)=>a+d.custoMonitores,0);
  const tmat=data.reduce((a,d)=>a+d.custoMateriais,0);
  const tl=data.reduce((a,d)=>a+d.lucro,0);
  const tm=data.reduce((a,d)=>a+d.qtdMonitores,0);
  document.getElementById('total-events').textContent=data.length;
  document.getElementById('stats-grid').innerHTML=[
    {label:'Receita Total',value:fmt(tv),sub:data.length+' eventos',cls:'gold'},
    {label:'Lucro Total',value:fmt(tl),sub:'margem '+(tv?Math.round(tl/tv*100):0)+'%',cls:'green'},
    {label:'Custo Monitores',value:fmt(tcm),sub:tm+' monitores no total',cls:'red'},
    {label:'Custo Materiais',value:fmt(tmat),sub:'total gasto em materiais',cls:'blue'},
  ].map(s=>`<div class="stat-card ${s.cls}"><div class="stat-label">${s.label}</div><div class="stat-value">${s.value}</div><div class="stat-sub">${s.sub}</div></div>`).join('');
  document.getElementById('footer-count').textContent=data.length+' registros · Lucro total '+fmtFull(tl);
}

function renderBar(){
  const map={};
  data.forEach(d=>{map[d.nomeContratante]=(map[d.nomeContratante]||0)+d.valor});
  const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const max=sorted[0]?.[1]||1;
  document.getElementById('bar-chart').innerHTML=sorted.map(([name,val])=>{
    const col=name==='Dudu Bar'?'var(--dudubar)':'var(--accent)';
    return `<div class="bar-item"><div class="bar-label" title="${name}">${name}</div><div class="bar-track"><div class="bar-fill" style="width:${(val/max*100).toFixed(1)}%;background:${col}"></div></div><div class="bar-val">${fmt(val)}</div></div>`;
  }).join('');
}

function renderDonut(){
  const counts={};
  data.forEach(d=>{counts[d.tipoServico]=(counts[d.tipoServico]||0)+1});
  const total=data.length||1;
  const colors={Festa:'#f0c060',DuduBar:'#e07a5f',Materiais:'#81b3d2'};
  const entries=Object.entries(counts);
  let offset=0;
  const paths=entries.map(([type,count])=>{
    const pct=count/total,large=pct>.5?1:0,r=50,cx=60,cy=60;
    const s=offset*2*Math.PI-Math.PI/2,e=(offset+pct)*2*Math.PI-Math.PI/2;
    const x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s),x2=cx+r*Math.cos(e),y2=cy+r*Math.sin(e);
    offset+=pct;
    return `<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${large},1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${colors[type]||'#888'}" opacity=".85"/>`;
  });
  document.getElementById('donut-wrap').innerHTML=`<svg width="120" height="120" viewBox="0 0 120 120">${paths.join('')}<circle cx="60" cy="60" r="32" fill="var(--surface)"/><text x="60" y="65" text-anchor="middle" fill="var(--text)" font-family="Playfair Display,serif" font-size="16" font-weight="700">${total}</text></svg><div class="donut-legend">${entries.map(([t,c])=>`<div class="donut-legend-item"><div class="donut-dot" style="background:${colors[t]||'#888'}"></div><span>${t} (${c})</span></div>`).join('')}</div>`;
}

function renderTimeline(){
  const monthSet=new Set(data.map(d=>d.data.slice(0,7)));
  const months=[...monthSet].sort();
  const names=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  document.getElementById('timeline-months').innerHTML=months.map(m=>{const[y,mo]=m.split('-');return `<div class="timeline-month">${names[parseInt(mo)-1]} ${y}</div>`}).join('');
  const colors={Festa:'var(--festa)',DuduBar:'var(--dudubar)',Materiais:'var(--materiais)'};
  const total=months.length||1;
  document.getElementById('timeline-track').innerHTML=data.map((d,i)=>{
    const mo=d.data.slice(0,7),day=parseInt(d.data.slice(8))||1;
    const mi=months.indexOf(mo);
    const left=((mi/total)*100+(day/31)*(100/total)*.9).toFixed(1);
    const top=14+(i%4)*12;
    const name=encodeURIComponent(d.nomeContratante);
    return `<div class="timeline-dot" style="left:${left}%;top:${top}px;background:${colors[d.tipoServico]||'#888'}" title="${d.nomeContratante} · ${fmtDate(d.data)} · ${fmt(d.valor)}" onclick="openModalFor(decodeURIComponent('${name}'))"></div>`;
  }).join('');
}

function renderFilters(){
  const types=['Todos',...new Set(data.map(d=>d.tipoServico))];
  document.getElementById('filters').innerHTML=types.map(t=>{
    const cls=t.toLowerCase().replace(/\s/g,'');
    return `<button class="filter-btn ${cls} ${activeFilter===t?'active':''}" onclick="setFilter('${t}')">${t}</button>`;
  }).join('');
}

function setFilter(t){activeFilter=t;renderFilters();applyFilters()}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('search-input').addEventListener('input',e=>{searchTerm=e.target.value.toLowerCase();applyFilters()});
  loadData();
});

function sortBy(key){sortDir=sortKey===key?sortDir*-1:1;sortKey=key;applyFilters()}

function applyFilters(){
  filtered=data.filter(d=>{
    const mt=activeFilter==='Todos'||d.tipoServico===activeFilter;
    const ms=!searchTerm||d.nomeContratante.toLowerCase().includes(searchTerm)||d.local.toLowerCase().includes(searchTerm)||d.tipoServico.toLowerCase().includes(searchTerm);
    return mt&&ms;
  });
  filtered.sort((a,b)=>{const va=a[sortKey],vb=b[sortKey];return(typeof va==='string'?va.localeCompare(vb):(va-vb))*sortDir});
  renderTable();
}

function renderTable(){
  const tbody=document.getElementById('table-body');
  if(!filtered.length){tbody.innerHTML=`<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--muted)">Nenhum resultado encontrado</td></tr>`;return}
  tbody.innerHTML=filtered.map(d=>{
    const lc=d.lucro>=0?'lucro-pos':'lucro-neg';
    const name=encodeURIComponent(d.nomeContratante);
    return `<tr onclick="openModalFor(decodeURIComponent('${name}'))">
      <td style="font-weight:500">${d.nomeContratante}</td>
      <td><span class="badge ${badgeClass(d.tipoServico)}">${d.tipoServico}</span></td>
      <td>${fmtDate(d.data)}</td>
      <td style="color:var(--muted)">${d.local}</td>
      <td style="text-align:right">${fmt(d.valor)}</td>
      <td style="text-align:right">${d.qtdMonitores}</td>
      <td style="text-align:right;color:var(--accent2)">${d.custoMateriais>0?fmt(d.custoMateriais):'—'}</td>
      <td style="text-align:right;color:var(--accent2)">${fmt(d.custoMonitores)}</td>
      <td style="text-align:right"><span class="${lc}">${fmt(d.lucro)}</span></td>
    </tr>`;
  }).join('');
}

function openModalFor(name){
  const events=data.filter(d=>d.nomeContratante===name);
  const tv=events.reduce((a,d)=>a+d.valor,0),tc=events.reduce((a,d)=>a+d.custoMateriais+d.custoMonitores,0),tl=events.reduce((a,d)=>a+d.lucro,0),tm=events.reduce((a,d)=>a+d.qtdMonitores,0);
  const lc=tl>=0?'lucro-pos':'lucro-neg';
  const cards=events.map(d=>{
    const tcls=d.tipoServico.toLowerCase().replace(/\s/g,'');
    return `<div class="event-card ${tcls}"><div class="event-card-top"><div><span class="badge ${badgeClass(d.tipoServico)}">${d.tipoServico}</span><span style="margin-left:8px;font-size:.85rem;font-weight:500">${d.local}</span></div><div class="event-card-date">${fmtDate(d.data)}</div></div><div class="event-card-grid"><div><div class="ecg-label">Valor</div><strong>${fmt(d.valor)}</strong></div><div><div class="ecg-label">C. Mat.</div><span style="color:var(--accent2)">${d.custoMateriais>0?fmt(d.custoMateriais):'—'}</span></div><div><div class="ecg-label">C. Mon.</div><span style="color:var(--accent2)">${fmt(d.custoMonitores)}</span></div><div><div class="ecg-label">Lucro</div><span class="${d.lucro>=0?'lucro-pos':'lucro-neg'}">${fmt(d.lucro)}</span></div><div><div class="ecg-label">Monitores</div>${d.qtdMonitores}</div></div>${d.observacoes?`<div class="event-obs">📝 ${d.observacoes}</div>`:''}</div>`;
  }).join('');
  document.getElementById('modal-content').innerHTML=`<div class="modal-name">${name}</div><div class="modal-summary">${events.length} evento${events.length!==1?'s':''} registrado${events.length!==1?'s':''}</div><div class="modal-kpis"><div class="modal-kpi"><div class="modal-kpi-label">Receita</div><div class="modal-kpi-value" style="color:var(--accent)">${fmt(tv)}</div></div><div class="modal-kpi"><div class="modal-kpi-label">Lucro</div><div class="modal-kpi-value ${lc}">${fmt(tl)}</div></div><div class="modal-kpi"><div class="modal-kpi-label">Custo Total</div><div class="modal-kpi-value" style="color:var(--accent2)">${fmt(tc)}</div></div><div class="modal-kpi"><div class="modal-kpi-label">Monitores</div><div class="modal-kpi-value" style="color:var(--accent3)">${tm}</div></div></div><div class="section-title" style="font-size:.85rem">Histórico de Eventos</div><div class="event-cards">${cards}</div>`;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(e){if(e.target===document.getElementById('overlay'))closeModalBtn()}
function closeModalBtn(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow=''}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModalBtn()});
</script>
</body>
</html>
